name: 发布标讯页面

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *"
      timezone: "Asia/Shanghai"
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - ".github/workflows/daily-pages.yml"

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 获取项目
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 发布 GitHub Pages
        run: |
          git subtree split --prefix site -b gh-pages-auto
          git push origin gh-pages-auto:gh-pages --force
