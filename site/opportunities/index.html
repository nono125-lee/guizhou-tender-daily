<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#101817">
  <meta name="description" content="贵州施工标讯粗筛、招标计划与采购公告关联工作台。">
  <title>标讯雷达</title>
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body>
  <div class="paper-grid" aria-hidden="true"></div>
  <header class="masthead">
    <div class="masthead-line">
      <span>GUIZHOU · CONSTRUCTION OPPORTUNITY DESK</span>
      <span id="updated-at">正在读取</span>
    </div>
    <div class="masthead-main">
      <div>
        <p class="kicker">施工粗筛 × 招标计划 × 公告关联</p>
        <h1>标讯雷达</h1>
      </div>
      <div class="masthead-note">
        <p>一次采集，一处判断。红色只表示近期需要处理，历史项目进入可检索归档。</p>
        <div class="source-links">
          <a href="../construction/">施工详细页</a>
          <a href="../tender-plan/">招标计划详细页</a>
        </div>
      </div>
    </div>
    <section class="scoreboard" aria-label="数据概览">
      <div><strong id="score-matches">0</strong><span>重点关联</span></div>
      <div><strong id="score-construction">0</strong><span>施工粗筛</span></div>
      <div><strong id="score-plans">0</strong><span>招标计划</span></div>
      <div id="health-card"><strong id="score-health">--</strong><span>运行状态</span></div>
    </section>
  </header>

  <main>
    <nav class="desk-tabs" aria-label="工作台栏目">
      <button type="button" data-view="matches" class="active">重点关联</button>
      <button type="button" data-view="construction">施工粗筛</button>
      <button type="button" data-view="plans">招标计划</button>
      <button type="button" data-view="status">运行状态</button>
    </nav>

    <section class="filters" id="filters">
      <label class="search-field">
        <span>检索</span>
        <input id="search" type="search" placeholder="项目、招标人、编号、建设内容">
      </label>
      <label data-views="matches">
        <span>时间范围</span>
        <select id="match-date-range">
          <option value="7" selected>近 7 天</option>
          <option value="30">近 30 天</option>
          <option value="90">近 90 天</option>
          <option value="all">全部历史</option>
        </select>
      </label>
      <label data-views="construction">
        <span>地区</span>
        <select id="construction-region"><option value="">全部地区</option></select>
      </label>
      <label data-views="construction">
        <span>时间</span>
        <select id="construction-date-range">
          <option value="1">最近 1 天</option>
          <option value="7">最近 7 天</option>
          <option value="14">最近 14 天</option>
          <option value="45">最近 45 天</option>
        </select>
      </label>
      <label data-views="construction">
        <span>信息源</span>
        <select id="construction-source"><option value="">全部信息源</option></select>
      </label>
      <label data-views="construction">
        <span>报名日期</span>
        <input id="construction-reg-date" type="text" placeholder="如 2026-06-11">
      </label>
      <label data-views="construction">
        <span>截止日期</span>
        <input id="construction-cutoff-date" type="date">
      </label>
      <label data-views="construction">
        <span>资质要求</span>
        <select id="construction-qualification"><option value="">全部资质要求</option></select>
      </label>
      <label data-views="plans">
        <span>地州市</span>
        <select id="plan-prefecture"><option value="">全部</option></select>
      </label>
      <label data-views="plans">
        <span>区县</span>
        <select id="plan-district"><option value="">全部</option></select>
      </label>
      <label data-views="plans">
        <span>发布时间</span>
        <select id="plan-date-range">
          <option value="all" selected>全部</option>
          <option value="1">今天</option>
          <option value="3">近三天</option>
          <option value="10">近十天</option>
          <option value="30">近一个月</option>
          <option value="90">近三个月</option>
        </select>
      </label>
      <label data-views="plans">
        <span>预计招标月</span>
        <input id="plan-planned-month" type="month">
      </label>
      <button id="reset" type="button">重置</button>
    </section>

    <section id="fund-strip" class="fund-strip" aria-label="资金来源快捷筛选" hidden></section>

    <section class="view-heading">
      <div>
        <p id="view-kicker">MATCH ARCHIVE</p>
        <h2 id="view-title">重点关联档案</h2>
      </div>
      <p><strong id="result-count">0</strong> <span id="result-label">条记录</span></p>
    </section>

    <section id="warning" class="warning" hidden></section>
    <section id="list" class="record-list" aria-live="polite"></section>
    <p id="empty" class="empty" hidden>当前没有符合条件的记录。</p>
    <button id="load-more" class="load-more" type="button" hidden>继续显示</button>
  </main>

  <footer>
    <p>自动关联只用于筛选，报名和投标前请核对原公告。</p>
    <p>重点关联同时保留施工招标公告和关联招标计划原文链接。</p>
  </footer>

  <template id="record-template">
    <article class="record-card">
      <div class="record-index"></div>
      <div class="record-main">
        <div class="record-meta">
          <time></time>
          <span class="record-source"></span>
          <span class="record-badge"></span>
        </div>
        <h3><a class="record-link" target="_blank" rel="noopener noreferrer"></a></h3>
        <p class="record-relation" hidden></p>
        <div class="record-links" hidden></div>
        <dl class="record-facts"></dl>
        <p class="record-content"></p>
        <div class="record-tags"></div>
        <p class="record-evidence" hidden></p>
      </div>
    </article>
  </template>

  <script src="./assets/app.js" defer></script>
</body>
</html>
