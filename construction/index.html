<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#102f2a">
    <meta
      name="description"
      content="贵州施工标讯，按公告资格要求筛选、自动更新、原文直达。"
    >
    <title>标讯-贵州-施工</title>
    <link rel="stylesheet" href="./assets/style.css?v=20260609-3">
  </head>
  <body>
    <div class="paper-noise" aria-hidden="true"></div>
    <header class="masthead">
      <h1>标讯-贵州-施工</h1>
      <div class="masthead-rule">
        <span id="update-date">正在读取...</span>
        <span>每天 8:00 前更新</span>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="筛选标讯">
        <label>
          <span>搜索</span>
          <input id="search" type="search" placeholder="项目、采购人、关键词">
        </label>
        <label>
          <span>地区</span>
          <select id="region"><option value="">全部地区</option></select>
        </label>
        <label>
          <span>时间</span>
          <select id="date-range">
            <option value="7">最近 7 天</option>
            <option value="14">最近 14 天</option>
            <option value="45">最近 45 天</option>
          </select>
        </label>
      </section>

      <section class="feedback-panel" aria-label="人工反馈">
        <div>
          <strong>人工复核</strong>
          <span id="feedback-status">尚未填写反馈</span>
        </div>
        <button id="submit-feedback" class="feedback-submit" type="button">
          当日反馈 <span id="feedback-count">0</span>
        </button>
      </section>

      <div id="warning" class="warning" hidden></div>
      <section id="list" class="tender-list" aria-live="polite"></section>
      <p id="empty" class="empty" hidden>没有符合当前筛选条件的标讯。</p>
    </main>

    <footer>
      <p>信息仅供筛选参考，报名和投标前请以原公告为准。</p>
      <p>自动采集出现验证码或网站异常时，会保留上次成功数据。</p>
    </footer>

    <template id="card-template">
      <article class="tender-card">
        <div class="card-index"></div>
        <div class="card-main">
          <div class="card-meta">
            <span class="date-label"></span>
            <time></time>
            <span class="location"></span>
            <span class="new-badge" hidden>新增</span>
          </div>
          <div class="title-row">
            <h3><a target="_blank" rel="noopener noreferrer"></a></h3>
            <button class="correct-button" data-field="title" type="button">纠正</button>
          </div>
          <dl>
            <div class="budget-row"><dt>预算</dt><dd class="budget"></dd><button class="correct-button" data-field="budget" type="button">纠正</button></div>
            <div class="buyer-row"><dt>采购人</dt><dd class="buyer"></dd><button class="correct-button" data-field="buyer" type="button">纠正</button></div>
            <div class="agency-row"><dt>采购代理机构</dt><dd class="agency"></dd><button class="correct-button" data-field="agency" type="button">纠正</button></div>
            <div class="deadline-row"><dt>投标截止时间</dt><dd class="deadline"></dd><button class="correct-button" data-field="bid_deadline" type="button">纠正</button></div>
            <div class="registration-row"><dt>报名日期</dt><dd class="registration"></dd><button class="correct-button" data-field="registration_period" type="button">纠正</button></div>
            <div class="source-row"><dt>信息源名称</dt><dd class="source"></dd><button class="correct-button" data-field="source_name" type="button">纠正</button></div>
          </dl>
          <div class="content-block">
            <div class="content-heading">
              <div class="content-label">项目主要内容</div>
              <button class="correct-button" data-field="project_content" type="button">纠正</button>
            </div>
            <p class="project-content"></p>
          </div>
          <div class="content-block qualification-block">
            <div class="content-label">资格要求（命中依据）</div>
            <p class="qualification-requirement"></p>
          </div>
          <div class="keywords"></div>
          <div class="review-actions">
            <button class="confirm-button" type="button">确认</button>
            <button class="exclude-button" type="button">排除</button>
            <span class="review-state"></span>
          </div>
        </div>
        <a class="read-more" target="_blank" rel="noopener noreferrer">查看原公告 ↗</a>
      </article>
    </template>

    <dialog id="feedback-dialog">
      <form method="dialog">
        <h2 id="dialog-title"></h2>
        <p id="dialog-project"></p>
        <label>
          <span id="dialog-label"></span>
          <textarea id="dialog-value" rows="4" required></textarea>
        </label>
        <div class="dialog-actions">
          <button value="cancel" type="submit">取消</button>
          <button id="dialog-save" value="default" type="button">保存</button>
        </div>
      </form>
    </dialog>

    <script src="./assets/app.js?v=20260609-3" defer></script>
  </body>
</html>
